<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API 测试页面</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; }
        .test { margin: 20px 0; padding: 15px; border: 1px solid #ccc; border-radius: 5px; }
        button { padding: 10px 20px; margin: 5px; }
        .success { color: green; }
        .error { color: red; }
        .result { margin-top: 10px; padding: 10px; background: #f5f5f5; border-radius: 3px; }
    </style>
</head>
<body>
    <h1>API 连接测试</h1>
    
    <div class="test">
        <h3>测试 1: 本地 API 代理 (端口 3001)</h3>
        <button onclick="testLocal()">测试本地代理</button>
        <div id="local-result" class="result"></div>
    </div>
    
    <div class="test">
        <h3>测试 2: Vercel API 端点</h3>
        <button onclick="testVercelHello()">测试 /api/hello</button>
        <button onclick="testVercelDify()">测试 /api/dify/parameters</button>
        <div id="vercel-result" class="result"></div>
    </div>
    
    <div class="test">
        <h3>测试 3: 直接 Dify API</h3>
        <button onclick="testDirectDify()">测试 Dify API</button>
        <div id="direct-result" class="result"></div>
    </div>

    <script>
        async function testLocal() {
            const resultEl = document.getElementById('local-result');
            resultEl.innerHTML = '测试中...';
            
            try {
                const response = await fetch('http://localhost:3001/api/dify/parameters', {
                    method: 'GET',
                    headers: {
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<span class="success">✓ 本地代理工作正常</span><br>${JSON.stringify(data, null, 2)}`;
                } else {
                    resultEl.innerHTML = `<span class="error">✗ 本地代理错误: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<span class="error">✗ 本地代理连接失败: ${error.message}</span>`;
            }
        }
        
        async function testVercelHello() {
            const resultEl = document.getElementById('vercel-result');
            resultEl.innerHTML = '测试中...';
            
            try {
                const response = await fetch('/api/hello');
                
                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<span class="success">✓ /api/hello 工作正常</span><br>${JSON.stringify(data, null, 2)}`;
                } else {
                    resultEl.innerHTML = `<span class="error">✗ /api/hello 错误: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<span class="error">✗ /api/hello 连接失败: ${error.message}</span>`;
            }
        }
        
        async function testVercelDify() {
            const resultEl = document.getElementById('vercel-result');
            resultEl.innerHTML = '测试中...';
            
            try {
                const response = await fetch('/api/dify/parameters');
                
                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<span class="success">✓ /api/dify/parameters 工作正常</span><br>${JSON.stringify(data, null, 2)}`;
                } else {
                    resultEl.innerHTML = `<span class="error">✗ /api/dify/parameters 错误: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<span class="error">✗ /api/dify/parameters 连接失败: ${error.message}</span>`;
            }
        }
        
        async function testDirectDify() {
            const resultEl = document.getElementById('direct-result');
            resultEl.innerHTML = '测试中...';
            
            try {
                const response = await fetch('https://api.dify.ai/v1/parameters', {
                    method: 'GET',
                    headers: {
                        'Authorization': 'Bearer app-rKBchGsFEQANgwGYC3LPHn8Y',
                        'Content-Type': 'application/json'
                    }
                });
                
                if (response.ok) {
                    const data = await response.json();
                    resultEl.innerHTML = `<span class="success">✓ Dify API 直接连接正常</span><br>${JSON.stringify(data, null, 2)}`;
                } else {
                    resultEl.innerHTML = `<span class="error">✗ Dify API 错误: ${response.status} ${response.statusText}</span>`;
                }
            } catch (error) {
                resultEl.innerHTML = `<span class="error">✗ Dify API 连接失败: ${error.message}</span>`;
            }
        }
    </script>
</body>
</html>
